version: "3.8"
services:
  postgres:
    image: postgres:14-alpine
    container_name: powermech_ai_postgres
    environment:
      POSTGRES_USER: powermech_dev
      POSTGRES_PASSWORD: dev_local_only
      POSTGRES_DB: powermech_ai_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U powermech_dev -d powermech_ai_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
